<!DOCTYPE html>
<html lang="en">
<head>
  <title>Unity Theme Gallery</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Unity Editor-inspired Avalonia UI theme gallery">
  <script>
    (function () {
      var href = new URL('.', location.href).pathname;
      if (!href.endsWith('/')) href += '/';
      var base = document.createElement('base');
      base.href = href;
      document.head.appendChild(base);
    })();
  </script>
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <div id="out">
    <div class="avalonia-splash">
      <h1>Unity Theme Gallery</h1>
      <p>Loading Avalonia WebAssembly…</p>
    </div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
