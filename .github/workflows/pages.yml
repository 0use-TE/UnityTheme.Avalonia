# Deploy Avalonia WASM gallery to GitHub Pages via GitHub Actions.
# One-time setup: Settings → Pages → Source → GitHub Actions
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Publish Avalonia WASM gallery
        run: dotnet publish samples/UnityTheme.Gallery.Browser/UnityTheme.Gallery.Browser.csproj -c Release

      - name: Add .nojekyll for _framework assets
        run: touch samples/UnityTheme.Gallery.Browser/bin/Release/net10.0-browser/publish/wwwroot/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: samples/UnityTheme.Gallery.Browser/bin/Release/net10.0-browser/publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
